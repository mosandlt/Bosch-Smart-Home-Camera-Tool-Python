[project]
name = "bosch-smart-home-camera-tool"
version = "10.4.0"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "urllib3",
]

[project.scripts]
bosch-camera = "bosch_camera:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
# Project-wide: lenient. STRICT_TYPING applies to NEW functions written after v10.2.1.
python_version = "3.10"
strict = false
warn_return_any = false
ignore_missing_imports = true

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-test.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format --check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy bosch_camera.py bosch_cloud_ssl.py bosch_i18n.py bosch_tls.py bosch_maintenance.py bosch_rcp_client.py get_token.py start_proxy.py

      # Coverage is scoped to the 5 modules the test suite actually imports.
      # get_token.py and start_proxy.py are standalone entry-point scripts
      # (invoked as `python3 get_token.py` / `python3 start_proxy.py`, never
      # imported by tests/) with zero coverage today — bug-hunt finding
      # 2026-07-11: leaving them silently out of --cov= hides that gap behind
      # a passing gate. Naming them here instead of omitting them keeps the
      # gap visible; writing real tests for them is tracked as follow-up
      # work, not silently declared done.
      - name: Pytest with coverage gate
        run: |
          pytest tests/ -q \
            --cov=bosch_camera --cov=bosch_cloud_ssl --cov=bosch_i18n \
            --cov=bosch_maintenance --cov=bosch_tls --cov=bosch_rcp_client \
            --cov-report=term-missing --cov-fail-under=90

  quality:
    name: pylint · codespell · pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-test.txt

      - name: pylint
        run: pylint --rcfile=pyproject.toml bosch_camera.py bosch_cloud_ssl.py bosch_i18n.py bosch_tls.py bosch_maintenance.py bosch_rcp_client.py get_token.py start_proxy.py

      - name: codespell
        run: codespell bosch_camera.py bosch_cloud_ssl.py bosch_i18n.py bosch_tls.py bosch_maintenance.py bosch_rcp_client.py get_token.py start_proxy.py tests/ README.md CHANGELOG.md

      - name: pip-audit (runtime deps)
        run: |
          python3 -c "import tomllib; print(chr(10).join(tomllib.load(open('pyproject.toml','rb'))['project']['dependencies']))" > /tmp/our_reqs.txt
          pip-audit -r /tmp/our_reqs.txt

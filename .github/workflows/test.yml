name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-test.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Mypy strict
        run: mypy bosch_camera.py bosch_i18n.py bosch_tls.py bosch_maintenance.py get_token.py start_proxy.py

      - name: Pytest
        run: pytest tests/ -q
